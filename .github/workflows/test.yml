name: Add External Submodules

on:
  workflow_dispatch:

jobs:
  setup-submodules:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Core Submodules
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          echo "Dọn dẹp liên kết cũ (nếu có)..."
          git rm -rf Natives/external/AFNetworking || true
          git rm -rf Natives/external/fishhook || true
          rm -f .gitmodules
          rm -rf .git/modules/Natives/external
          
          mkdir -p Natives/external
          
          echo "Thiết lập Submodule mới..."
          git submodule add https://github.com/AFNetworking/AFNetworking.git Natives/external/AFNetworking
          git submodule add https://github.com/facebook/fishhook.git Natives/external/fishhook
          
          git commit -m "chore: Cập nhật liên kết Submodule AFNetworking và fishhook" || echo "Không có gì thay đổi."
          git push