name: Add External Submodules

on:
  workflow_dispatch:

jobs:
  setup-submodules:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Core Submodules
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          echo "Dọn dẹp liên kết cũ..."
          git rm -rf Natives/external/AFNetworking || true
          git rm -rf Natives/external/fishhook || true
          git rm -rf Natives/external/DBNumberedSlider || true
          
          # Xóa đúng chuẩn Git và tạo lại file trống để fix lỗi "not in working tree"
          git rm -f .gitmodules || true
          rm -rf .git/modules/Natives/external
          touch .gitmodules
          
          mkdir -p Natives/external
          
          echo "Thêm Submodule bắt buộc..."
          git submodule add --force https://github.com/AFNetworking/AFNetworking.git Natives/external/AFNetworking
          git submodule add --force https://github.com/facebook/fishhook.git Natives/external/fishhook
          git submodule add --force https://github.com/khanhduytran0/DBNumberedSlider.git Natives/external/DBNumberedSlider
          
          git commit -m "chore: Bổ sung submodule DBNumberedSlider, AFNetworking, fishhook" || echo "Không có thay đổi."
          git push